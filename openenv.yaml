name: hardware-optimization-fleet
version: 1.1.0
description: >
  A multi-agent, cross-domain RL environment. The LLM agent acts as a Process
  Engineer  optimizing complex Design of Experiments (DoE). Features Test-Time
  Compute (Claude-style reasoning), dynamic production tasks (GPU vs TPU
  binning), and a multi-agent gauntlet including a  Financial Controller and a
  Senior Reviewer.
author: TensorTitans
theme: long_horizon_planning

tasks:
  - name: Data Center GPU (H200X)
    description: Maximize absolute yield for flagship performance chips. High
      budget, high volatility.
    difficulty: hard
    target_yield: 95.0

  - name: Edge TPU (Mobile Neural Engine)
    description: Optimize for thermal efficiency. Financial Controller will reject
      high temp/power recipes.
    difficulty: hard
    target_yield: 90.0

action_space:
  type: dict
  fields:
    - think # str — Test-Time Compute analysis (enforced prior to action)
    - params # Dict[str, float] — experiment parameter values
    - primary_bottleneck # str — agent's causal hypothesis
    - reasoning # str — short explanation
    - submit # bool — end episode and submit recipe

reward_components:
  yield_reward:
    weight: 0.40
    description: Normalized yield improvement.
  causal_attribution:
    weight: 0.20
    description: Strict parsing of the agent's bottleneck diagnosis against RSM
      ground truth.
  reasoning_reward:
    weight: 0.20
    description: PRM reward for Test-Time Compute deduction length and quality.
  financial_penalty:
    weight: 0.20
    description: Massive penalty if the Financial Controller agent rejects the recipe cost.

multi_agent:
  senior_engineer_reviewer:
    type: rule_based
    description: Evaluates physical parameter boundaries at final submission.
  financial_controller:
    type: rule_based
    description: intercepts every step. Rejects and penalizes actions that exceed
      the energy/budget constraints of the specific Task tier.
